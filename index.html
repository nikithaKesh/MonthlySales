<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cosmetics Sales Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F4F2EF; --surface:#FFFFFF; --ink:#211C26; --ink-soft:#5C5462;
  --line:#E7E2DD; --line-soft:#F0ECE7; --muted:#8B8391;
  --biseka:#2E6B4E; --biseka-soft:#E4EEE8; --biseka-tint:#F1F7F3;
  --love:#C24E6B; --love-soft:#F6E3E9; --love-tint:#FBEFF3;
  --gold:#B0863A; --shadow:0 1px 2px rgba(33,28,38,.04),0 8px 24px rgba(33,28,38,.06);
  --accent:var(--biseka); --accent-soft:var(--biseka-soft); --accent-tint:var(--biseka-tint);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:Inter,system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:Fraunces,Georgia,serif;font-weight:600;margin:0;letter-spacing:-.01em}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px 80px}
.tnum{font-variant-numeric:tabular-nums}

/* Header */
header{padding:34px 24px 0;max-width:1180px;margin:0 auto}
.brandline{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.brandline h1{font-size:30px}
.brandline .sub{color:var(--muted);font-size:13px}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:6px}

/* Controls */
.controls{position:sticky;top:0;z-index:20;background:linear-gradient(var(--paper) 78%,rgba(244,242,239,0));padding:18px 24px 14px;margin:22px auto 0;max-width:1180px;display:flex;gap:20px;flex-wrap:wrap;align-items:flex-end}
.ctl-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:7px;display:block}
.seg{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:4px;gap:3px;box-shadow:var(--shadow)}
.seg button{font-family:inherit;font-size:13px;font-weight:500;color:var(--ink-soft);background:none;border:none;padding:7px 15px;border-radius:8px;cursor:pointer;transition:.15s;white-space:nowrap}
.seg button:hover{color:var(--ink)}
.seg button.on{background:var(--accent);color:#fff}
.seg.months button{padding:7px 11px;font-size:12.5px}
.seg button:disabled{opacity:.34;cursor:not-allowed}
.seg button:disabled:hover{color:var(--ink-soft)}

/* Nav */
nav.sections{display:flex;gap:4px;flex-wrap:wrap;max-width:1180px;margin:8px auto 0;padding:0 24px;border-bottom:1px solid var(--line)}
nav.sections a{font-size:13px;font-weight:500;color:var(--ink-soft);text-decoration:none;padding:10px 13px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;cursor:pointer}
nav.sections a:hover{color:var(--ink)}
nav.sections a.on{color:var(--accent);border-bottom-color:var(--accent)}

/* Cards */
.grid{display:grid;gap:16px;margin-top:22px}
.cols-2{grid-template-columns:1fr 1fr}
.cols-4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:20px 22px;box-shadow:var(--shadow)}
.card h3{font-size:16px;margin-bottom:2px}
.card .hint{font-size:12px;color:var(--muted);margin-bottom:16px}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
.card-head h3{margin-bottom:2px}
.card-head .hint{margin:0}

/* KPI */
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow)}
.kpi .k-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
.kpi .k-val{font-family:Fraunces,serif;font-size:30px;font-weight:600;margin-top:6px;line-height:1}
.kpi .k-sub{font-size:12px;color:var(--ink-soft);margin-top:7px}
.kpi.hero{background:var(--accent-tint);border-color:var(--accent-soft)}
.kpi.hero .k-val{color:var(--accent)}

/* bars */
.bars{display:flex;flex-direction:column;gap:9px}
.bar-row{display:grid;grid-template-columns:150px 1fr 56px;align-items:center;gap:12px}
.bar-row .lab{font-size:12.5px;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{background:var(--line-soft);border-radius:6px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;background:var(--accent);transition:width .6s cubic-bezier(.2,.7,.2,1)}
.bar-row .val{font-size:12.5px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.bar-fill.lo{background:var(--gold)}
.rank{display:inline-block;width:18px;color:var(--muted);font-weight:600;font-size:12px}

/* line/area chart */
svg.chart{width:100%;height:auto;display:block;overflow:visible}
.gridline{stroke:var(--line-soft)}
.axis-lab{fill:var(--muted);font-size:11px;font-family:Inter,sans-serif}
.dot{fill:var(--accent)}

/* table */
.tbl-scroll{overflow-x:auto;margin:0 -6px}
table{border-collapse:collapse;width:100%;font-size:12.5px}
th,td{padding:8px 10px;text-align:right;white-space:nowrap}
th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:var(--surface)}
thead th{color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid var(--line)}
tbody tr{border-bottom:1px solid var(--line-soft)}
tbody tr:hover{background:var(--accent-tint)}
td.tot{font-weight:700}
.cellbar{position:relative}
.cellbar span{position:relative;z-index:1}
.cellbar i{position:absolute;left:0;top:0;bottom:0;background:var(--accent-soft);border-radius:4px;z-index:0}
.search{width:100%;max-width:260px;padding:8px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:13px;color:var(--ink)}
.search:focus{outline:none;border-color:var(--accent)}

/* misc */
.pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--accent-tint);color:var(--accent)}
.note{font-size:12px;color:var(--muted);background:var(--line-soft);border-radius:10px;padding:11px 14px;margin-top:8px}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);margin-bottom:12px}
.legend b{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
.empty{color:var(--muted);font-size:13px;padding:20px 0;text-align:center}
.mini-select{padding:7px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface)}
.section{scroll-margin-top:150px}
.section-title{display:flex;align-items:baseline;gap:12px;margin:34px 0 2px}
.section-title h2{font-size:21px}
.section-title .num{font-family:Fraunces,serif;color:var(--accent);font-size:15px;font-weight:600}
.section-sub{color:var(--muted);font-size:13px;margin:0 0 6px}
footer{max-width:1180px;margin:60px auto 0;padding:22px 24px;border-top:1px solid var(--line);color:var(--muted);font-size:12px}

@media(max-width:900px){
  .cols-4{grid-template-columns:1fr 1fr}
  .cols-2{grid-template-columns:1fr}
  .bar-row{grid-template-columns:110px 1fr 48px}
}
@media(max-width:560px){
  .cols-4{grid-template-columns:1fr 1fr}
  .brandline h1{font-size:24px}
  .wrap{padding:0 14px 60px}
  header,.controls,nav.sections{padding-left:14px;padding-right:14px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

<nav class="sections" id="sectionNav"></nav>

<div class="wrap" id="app"></div>

<footer id="foot"></footer>

function pick(arr){return STATE.month==='all'?arr.reduce((a,b)=>a+b,0):arr[STATE.month];}

/* ---------- chart builders ---------- */
function lineChart(values,labels,{h=170,area=true}={}){
  const w=620,padL=38,padR=12,padT=14,padB=26;
  const max=Math.max(1,...values);
  const iw=w-padL-padR, ih=h-padT-padB;
  const x=i=>padL+(labels.length<=1?iw/2:iw*i/(labels.length-1));
  const y=v=>padT+ih-(v/max)*ih;
  let grid='',ax='';
  for(let g=0;g<=4;g++){const gy=padT+ih*g/4;const gv=Math.round(max*(1-g/4));
    grid+=`<line class="gridline" x1="${padL}" y1="${gy}" x2="${w-padR}" y2="${gy}"/>`;
    ax+=`<text class="axis-lab" x="${padL-6}" y="${gy+3}" text-anchor="end">${fmt(gv)}</text>`;}
  labels.forEach((l,i)=>ax+=`<text class="axis-lab" x="${x(i)}" y="${h-8}" text-anchor="middle">${l}</text>`);
  const pts=values.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
  const areaPath=`${padL},${padT+ih} ${pts} ${x(values.length-1)},${padT+ih}`;
  let dots=values.map((v,i)=>`<circle class="dot" cx="${x(i)}" cy="${y(v)}" r="3.5"/><text class="axis-lab" x="${x(i)}" y="${y(v)-9}" text-anchor="middle" style="font-weight:600;fill:var(--ink)">${fmt(v)}</text>`).join('');
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" role="img">${grid}
    ${area?`<polygon points="${areaPath}" fill="var(--accent-tint)"/>`:''}
    <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}${ax}</svg>`;
}
function groupedBars(series,labels,names){
  // series: array of {name, values[]}; labels: month labels
  const w=620,padL=38,padR=12,padT=14,padB=26,h=200;
  const iw=w-padL-padR, ih=h-padT-padB;
  const max=Math.max(1,...series.flatMap(s=>s.values));
  const groups=labels.length, per=series.length;
  const gw=iw/groups, bw=Math.min(26,(gw-8)/per);
  const colors=palette(per);
  let grid='',ax='',bars='';
  for(let g=0;g<=4;g++){const gy=padT+ih*g/4;grid+=`<line class="gridline" x1="${padL}" y1="${gy}" x2="${w-padR}" y2="${gy}"/>`;
    ax+=`<text class="axis-lab" x="${padL-6}" y="${gy+3}" text-anchor="end">${fmt(Math.round(max*(1-g/4)))}</text>`;}
  labels.forEach((l,gi)=>{
    const gx=padL+gw*gi+gw/2;
    ax+=`<text class="axis-lab" x="${gx}" y="${h-8}" text-anchor="middle">${l}</text>`;
    series.forEach((s,si)=>{
      const bh=(s.values[gi]/max)*ih;
      const bx=gx-(per*bw)/2+si*bw;
      bars+=`<rect x="${bx}" y="${padT+ih-bh}" width="${bw-2}" height="${bh}" rx="3" fill="${colors[si]}"><title>${s.name} · ${l}: ${fmt(s.values[gi])}</title></rect>`;
    });
  });
  return `<svg class="chart" viewBox="0 0 ${w} ${h}">${grid}${bars}${ax}</svg>`;
}
function palette(n){
  const base=['var(--accent)','#B0863A','#5C7FB0','#9E6BB0','#54A0A0','#C0705A','#7B9E54','#B05470'];
  return Array.from({length:n},(_,i)=>base[i%base.length]);
}
function barList(rows,{lo=false,max=null}={}){
  if(!rows.length) return `<div class="empty">No sales in ${monthLabel()}.</div>`;
  const mx=max??Math.max(1,...rows.map(r=>r.value));
  const wrap=el('div','bars');
  rows.forEach((r,i)=>{
    const row=el('div','bar-row');
    row.innerHTML=`<div class="lab" title="${esc(r.label)}">${r.rank?`<span class="rank">${r.rank}</span>`:''}${esc(r.label)}</div>
      <div class="bar-track"><div class="bar-fill ${lo?'lo':''}" style="width:0"></div></div>
      <div class="val">${fmt(r.value)}</div>`;
    wrap.appendChild(row);
    requestAnimationFrame(()=>row.querySelector('.bar-fill').style.width=(r.value/mx*100)+'%');
  });
  return wrap;
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---------- sections ---------- */
const SECTIONS=[
  {id:'overview', name:'Overview', build:secOverview},
  {id:'split',    name:'Online vs Shop', build:secChannelSplit, when:d=>d.channelSplit},
  {id:'products', name:'Products', build:secProducts},
  {id:'ranking', name:'Top & Bottom', build:secRanking},
  {id:'people',  name:'Care Agents', build:secPeople, when:d=>d.userMonthly},
  {id:'shops',   name:'Shops', build:secShops, when:d=>d.shopMonthly},
  {id:'geo',     name:'Cities & Districts', build:secGeo, when:d=>d.cityMonthly},
  {id:'payments',name:'Payments & Status', build:secPay, when:d=>d.paymentMonthly},
];

function secOverview(d){
  const sec=el('section','section');sec.id='sec-overview';
  sec.append(sectionTitle('01','Overview',`Volume and momentum for ${STATE.brand} · ${STATE.channel}`));
  const units=pick(d.monthlyUnits), orders=pick(d.monthlyOrders);
  const aov=orders? units/orders:0;
  const activeProd=Object.values(d.productMonthly).filter(v=>pick(v)>0).length;
  const kpis=el('div','grid cols-4');
  kpis.append(
    kpi('Products sold'+(STATE.month==='all'?' to date':''),fmt(units),`units · ${monthLabel()}`,true),
    kpi('Orders',fmt(orders),`${monthLabel()}`),
    kpi('Avg units / order',aov.toFixed(2),'basket size'),
    kpi('Active products',fmt(activeProd),`sold in ${monthLabel()}`),
  );
  sec.append(kpis);
  const g=el('div','grid cols-2');g.style.marginTop='16px';
  const c1=card('Units sold by month','Total product units per month across '+monthLabel().replace('all months','the period'));
  c1.append(rangeToNode(lineChart(d.monthlyUnits,MONTHS)));
  const c2=card('Orders by month','Number of orders placed each month');
  c2.append(rangeToNode(lineChart(d.monthlyOrders,MONTHS)));
  g.append(c1,c2);sec.append(g);
  // MoM growth
  const growth=card('Month-over-month growth','Change in units vs. the previous month');
  const gr=[];for(let i=1;i<d.monthlyUnits.length;i++){const p=d.monthlyUnits[i-1],c=d.monthlyUnits[i];gr.push({label:MONTHS[i],value:p?((c-p)/p*100):0});}
  const mxg=Math.max(1,...gr.map(x=>Math.abs(x.value)));
  const gb=el('div','bars');
  gr.forEach(x=>{const row=el('div','bar-row');const pos=x.value>=0;
    row.innerHTML=`<div class="lab">${x.label}</div>
      <div class="bar-track" style="background:var(--line-soft)"><div class="bar-fill" style="width:0;background:${pos?'var(--accent)':'var(--gold)'}"></div></div>
      <div class="val" style="color:${pos?'var(--accent)':'var(--gold)'}">${pos?'+':''}${x.value.toFixed(0)}%</div>`;
    gb.append(row);requestAnimationFrame(()=>row.querySelector('.bar-fill').style.width=(Math.abs(x.value)/mxg*100)+'%');});
  growth.append(gb);
  growth.append(el('div','note','Growth ignores the Month focus filter and always compares consecutive months.'));
  const wg=el('div','grid');wg.style.marginTop='16px';wg.append(growth);sec.append(wg);
  return sec;
}

function secChannelSplit(d){
  const sec=el('section','section');sec.id='sec-split';
  sec.append(sectionTitle('','Online vs Shop','How Biseka’s two channels compare for '+monthLabel()));
  const cs=d.channelSplit;
  // ---- highlights strip ----
  const totalsByProd=Object.entries(d.productMonthly).map(([n,v])=>({n,val:pick(v)})).filter(r=>r.val>0);
  const best=[...totalsByProd].sort((a,b)=>b.val-a.val)[0];
  const slow=[...totalsByProd].sort((a,b)=>a.val-b.val)[0];
  const mUnits=d.monthlyUnits;
  const busyIdx=mUnits.indexOf(Math.max(...mUnits));
  const onU=pick(cs.Online.monthlyUnits), shU=pick(cs.Shop.monthlyUnits), tot=onU+shU;
  const lead= onU>=shU?'Online':'Shop';
  const leadShare= tot? Math.round((Math.max(onU,shU)/tot)*100):0;
  const orders=pick(d.monthlyOrders), units=pick(d.monthlyUnits);
  const daysInPeriod=STATE.month==='all'?197:30; // Jan1–Jul16 ≈ 197 days; ~30/mo
  const k=el('div','grid cols-4');
  k.append(
    kpi('Total bottles'+(STATE.month==='all'?' to date':''),fmt(units),`${monthLabel()} · Online + Shop`,true),
    kpi('Avg units / order',orders?(units/orders).toFixed(2):'0','basket size'),
    kpi('Avg units / day','~'+fmt(units/daysInPeriod),`over ${monthLabel()}`),
    kpi('Leading channel',lead,`${leadShare}% of units`),
  );
  sec.append(k);
  const k2=el('div','grid cols-2');k2.style.marginTop='16px';
  k2.append(
    kpi('Most-selling product',best?best.n:'—',best?fmt(best.val)+' units in '+monthLabel():''),
    kpi('Slowest-selling product',slow?slow.n:'—',slow?fmt(slow.val)+' units in '+monthLabel():''),
  );
  sec.append(k2);
  const k3=el('div','grid cols-2');k3.style.marginTop='16px';
  k3.append(
    kpi('Busiest month',MONTHS[busyIdx],fmt(mUnits[busyIdx])+' units'),
    kpi('Online : Shop split',`${tot?Math.round(onU/tot*100):0}% : ${tot?Math.round(shU/tot*100):0}%`,`${fmt(onU)} vs ${fmt(shU)} units · ${monthLabel()}`),
  );
  sec.append(k3);
  // ---- channel contribution charts ----
  const g=el('div','grid cols-2');g.style.marginTop='16px';
  const c1=card('Units by month · by channel','Online and Shop bottle sales side by side');
  c1.append(legend(['Online','Shop']));
  c1.append(rangeToNode(groupedBars([
    {name:'Online',values:cs.Online.monthlyUnits},
    {name:'Shop',values:cs.Shop.monthlyUnits}],MONTHS)));
  const c2=card('Orders by month · by channel','Order counts per channel');
  c2.append(legend(['Online','Shop']));
  c2.append(rangeToNode(groupedBars([
    {name:'Online',values:cs.Online.monthlyOrders},
    {name:'Shop',values:cs.Shop.monthlyOrders}],MONTHS)));
  g.append(c1,c2);sec.append(g);
  // ---- stacked share by month ----
  const c3=card('Channel share of units','Each month’s split between Online and Shop');
  const bars=el('div','bars');
  MONTHS.forEach((m,i)=>{
    const o=cs.Online.monthlyUnits[i], s=cs.Shop.monthlyUnits[i], t=o+s||1;
    const row=el('div','bar-row');
    row.innerHTML=`<div class="lab">${m}</div>
      <div class="bar-track" style="display:flex">
        <div class="bar-fill" style="width:0;background:var(--accent);border-radius:6px 0 0 6px" data-w="${o/t*100}"><title></title></div>
        <div class="bar-fill" style="width:0;background:var(--gold);border-radius:0 6px 6px 0" data-w="${s/t*100}"></div>
      </div>
      <div class="val">${fmt(o+s)}</div>`;
    bars.append(row);
    requestAnimationFrame(()=>row.querySelectorAll('.bar-fill').forEach(f=>f.style.width=f.dataset.w+'%'));
  });
  c3.append(legend(['Online','Shop']));c3.append(bars);
  const wg=el('div','grid');wg.style.marginTop='16px';wg.append(c3);sec.append(wg);
  return sec;
}

function secProducts(d){
  const sec=el('section','section');sec.id='sec-products';
  sec.append(sectionTitle('02','Products',`Units for every product, month by month — ${STATE.brand} · ${STATE.channel}`));
  const c=card('','');
  const head=el('div','card-head');
  head.innerHTML=`<div><h3>Product sales by month</h3><div class="hint">Full product names · sortable · sorted by total. Type to filter.</div></div>`;
  const search=el('input','search');search.type='search';search.placeholder='Search product…';
  head.append(search);c.append(head);
  const holder=el('div','tbl-scroll');c.append(holder);
  const rows=Object.entries(d.productMonthly).map(([n,v])=>({n,v,tot:v.reduce((a,b)=>a+b,0)})).sort((a,b)=>b.tot-a.tot);
  const maxCell=Math.max(1,...rows.flatMap(r=>r.v));
  function render(q=''){
    const f=rows.filter(r=>r.n.toLowerCase().includes(q.toLowerCase()));
    const t=el('table');
    t.innerHTML=`<thead><tr><th>Product</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}<th>Total</th></tr></thead>`;
    const tb=el('tbody');
    f.forEach(r=>{
      const tr=el('tr');
      tr.innerHTML=`<td title="${esc(r.n)}">${esc(r.n)}</td>`+
        r.v.map(x=>`<td class="cellbar"><i style="width:${x/maxCell*100}%"></i><span>${x?fmt(x):'·'}</span></td>`).join('')+
        `<td class="tot">${fmt(r.tot)}</td>`;
      tb.append(tr);
    });
    t.append(tb);holder.innerHTML='';holder.append(t);
    if(!f.length)holder.append(el('div','empty','No products match “'+esc(q)+'”.'));
  }
  search.addEventListener('input',()=>render(search.value));
  render();
  sec.append(c);return sec;
}

function secRanking(d){
  const sec=el('section','section');sec.id='sec-ranking';
  sec.append(sectionTitle('03','Top & Bottom',`Best and slowest sellers for ${monthLabel()}`));
  const rows=Object.entries(d.productMonthly).map(([n,v])=>({label:n,value:pick(v)})).filter(r=>r.value>0);
  const top=[...rows].sort((a,b)=>b.value-a.value).slice(0,5).map((r,i)=>({...r,rank:i+1}));
  const bot=[...rows].sort((a,b)=>a.value-b.value).slice(0,5).map((r,i)=>({...r,rank:i+1}));
  const g=el('div','grid cols-2');
  const c1=card('Top 5 products','Highest units in '+monthLabel());
  c1.append(barList(top,{max:Math.max(1,...top.map(r=>r.value))}));
  const c2=card('Bottom 5 products','Lowest units in '+monthLabel()+' (among products that sold)');
  c2.append(barList(bot,{lo:true,max:Math.max(1,...top.map(r=>r.value))}));
  g.append(c1,c2);sec.append(g);
  return sec;
}

  const c2=card('Monthly comparison','Top agents across every month');

  c2.append(legend(top.map(s=>s.name)));
  c2.append(rangeToNode(groupedBars(top,MONTHS)));
  g.append(c1,c2);sec.append(g);
  // table
  const c3=card('All agents · month by month','Units per agent per month');
  const holder=el('div','tbl-scroll');
  const t=el('table');t.innerHTML=`<thead><tr><th>Agent</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}<th>Total</th></tr></thead>`;
  const tb=el('tbody');
  names.forEach(n=>{const v=d.userMonthly[n];const tot=v.reduce((a,b)=>a+b,0);
    tb.append(rowFromVals(n,v,tot));});
  t.append(tb);holder.append(t);c3.append(holder);
  const wg=el('div','grid');wg.style.marginTop='16px';wg.append(c3);sec.append(wg);
  return sec;

function secShops(d){
  const sec=el('section','section');sec.id='sec-shops';
  sec.append(sectionTitle('05','Shops',`Outlet performance — ${STATE.brand} · Shop`));
  const shops=Object.keys(d.shopMonthly).sort((a,b)=>d.shopMonthly[b].reduce((x,y)=>x+y,0)-d.shopMonthly[a].reduce((x,y)=>x+y,0));
  const g=el('div','grid cols-2');
  const c1=card('Shop totals','Units in '+monthLabel());
  const rowsT=shops.map(s=>({label:s,value:pick(d.shopMonthly[s])})).filter(r=>r.value>0).sort((a,b)=>b.value-a.value).map((r,i)=>({...r,rank:i+1}));
  c1.append(barList(rowsT));
  const c2=card('Shops across months','Monthly units per outlet');
  c2.append(legend(shops.map(s=>s)));
  c2.append(rangeToNode(groupedBars(shops.map(s=>({name:s,values:d.shopMonthly[s]})),MONTHS)));
  g.append(c1,c2);sec.append(g);
  // shop-wise product totals
  const c3=card('','');
  const head=el('div','card-head');
  head.innerHTML=`<div><h3>Shop-wise product totals</h3><div class="hint">Total units sold per product at a chosen outlet (whole period)</div></div>`;
  const sel=el('select','mini-select');shops.forEach(s=>sel.append(new Option(s,s)));head.append(sel);
  c3.append(head);
  const body=el('div');c3.append(body);
  function drawShop(s){
    const prods=Object.entries(d.shopProductTotals[s]||{}).map(([n,v])=>({label:n,value:v})).sort((a,b)=>b.value-a.value);
    const top=prods.slice(0,12);
    body.innerHTML='';body.append(barList(top,{max:Math.max(1,...top.map(r=>r.value))}));
    body.append(el('div','note',`${s}: ${prods.length} products sold · ${fmt(prods.reduce((a,b)=>a+b.value,0))} units total. Showing top 12.`));
  }
  sel.addEventListener('change',()=>drawShop(sel.value));drawShop(shops[0]);
  const wg=el('div','grid');wg.style.marginTop='16px';wg.append(c3);sec.append(wg);
  return sec;
}

/* ---------- small factories ---------- */
function kpi(label,val,sub,hero){const e=el('div','kpi'+(hero?' hero':''));e.innerHTML=`<div class="k-label">${label}</div><div class="k-val tnum">${val}</div><div class="k-sub">${sub}</div>`;return e;}
function card(title,hint){const c=el('div','card');if(title!==''||hint!==''){c.innerHTML=`<h3>${title}</h3>${hint?`<div class="hint">${hint}</div>`:''}`;}return c;}
function sectionTitle(num,title,sub){const w=el('div');const t=el('div','section-title');t.innerHTML=`<span class="num">${num}</span><h2>${title}</h2>`;w.append(t);if(sub)w.append(el('p','section-sub',sub));return w;}
function legend(names){const l=el('div','legend');const cols=palette(names.length);names.forEach((n,i)=>{const s=el('span');s.innerHTML=`<b style="background:${cols[i]}"></b>${esc(n)}`;l.append(s);});return l;}
function rangeToNode(html){const d=el('div');d.innerHTML=html;return d;}
function rowFromVals(name,vals,tot){const maxCell=Math.max(1,...vals);const tr=el('tr');
  tr.innerHTML=`<td title="${esc(name)}">${esc(name)}</td>`+vals.map(x=>`<td class="cellbar"><i style="width:${x/maxCell*100}%"></i><span>${x?fmt(x):'·'}</span></td>`).join('')+`<td class="tot">${fmt(tot)}</td>`;return tr;}

/* ---------- controls & render ---------- */
function buildControls(){
  const bs=$('#brandSeg');bs.innerHTML='';
  Object.keys(DATA.brands).forEach(b=>{const btn=el('button',b===STATE.brand?'on':'',b);btn.onclick=()=>{STATE.brand=b;STATE.channel=Object.keys(DATA.brands[b].channels)[0];render();};bs.append(btn);});
  // exact extract disabled chip
  const ee=el('button','',"Exact Extract");ee.disabled=true;ee.title="No order data in the source file";bs.append(ee);

  const cs=$('#chanSeg');cs.innerHTML='';
  Object.keys(DATA.brands[STATE.brand].channels).forEach(ch=>{const btn=el('button',ch===STATE.channel?'on':'',ch);btn.onclick=()=>{STATE.channel=ch;render();};cs.append(btn);});

  const ms=$('#monthSeg');ms.innerHTML='';
  const all=el('button',STATE.month==='all'?'on':'','All');all.onclick=()=>{STATE.month='all';render();};ms.append(all);
  MONTHS.forEach((m,i)=>{const btn=el('button',STATE.month===i?'on':'',m);btn.onclick=()=>{STATE.month=i;render();};ms.append(btn);});
}
function buildNav(d){
  const nav=$('#sectionNav');nav.innerHTML='';
  activeSections(d).forEach(s=>{const a=el('a','',s.name);a.onclick=()=>{const t=$('#sec-'+s.id);if(t)t.scrollIntoView({behavior:'smooth'});};a.dataset.sec=s.id;nav.append(a);});
}
function activeSections(d){return SECTIONS.filter(s=>!s.when||s.when(d));}

function render(){
  setAccent(STATE.brand);
  buildControls();
  const d=cur();
  buildNav(d);
  $('#hdrsub').textContent=`${STATE.brand} — ${STATE.channel} channel`;
  const app=$('#app');app.innerHTML='';
  activeSections(d).forEach(s=>app.append(s.build(d)));
  app.querySelectorAll('.section-title .num').forEach((n,i)=>n.textContent=String(i+1).padStart(2,'0'));
  $('#foot').innerHTML=`Data range Jan–Jul 2026 · generated ${DATA.meta.lastUpdated} · ${DATA.meta.note} “Sales” = units sold. City/District coverage is online orders only; care-agent and shop views are staff-side. Bottom-5 shows the lowest sellers among products that had at least one sale in the selected month.`;
  // scroll-spy
  spy(d);
}
function spy(d){
  const links=[...document.querySelectorAll('#sectionNav a')];
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.toggle('on',l.dataset.sec===e.target.id.replace('sec-','')));}});},{rootMargin:'-45% 0px -50% 0px'});
  activeSections(d).forEach(s=>{const t=$('#sec-'+s.id);if(t)obs.observe(t);});
}

/* init */
STATE.brand=Object.keys(DATA.brands)[0];
STATE.channel=Object.keys(DATA.brands[STATE.brand].channels)[0];
render();
</script>
</body>
</html>
